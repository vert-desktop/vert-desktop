name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  prepare-binaries:
    name: Download Sidecars (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ffmpeg_url: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
            magick_url: https://github.com/ImageMagick/ImageMagick/releases/download/7.1.1-43/ImageMagick-7.1.1-43-x86_64.AppImage
            pandoc_url: https://github.com/jgm/pandoc/releases/download/3.6.2/pandoc-3.6.2-linux-amd64.tar.gz
          - platform: macos-13
            target: x86_64-apple-darwin
            ffmpeg_url: https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
            magick_url: https://imagemagick.org/archive/binaries/ImageMagick-x86_64-apple-darwin20.1.0.tar.gz
            pandoc_url: https://github.com/jgm/pandoc/releases/download/3.6.2/pandoc-3.6.2-x86_64-macOS.zip
          - platform: macos-latest
            target: aarch64-apple-darwin
            ffmpeg_url: https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip
            magick_url: https://imagemagick.org/archive/binaries/ImageMagick-arm64-apple-darwin23.6.0.tar.gz
            pandoc_url: https://github.com/jgm/pandoc/releases/download/3.6.2/pandoc-3.6.2-arm64-macOS.zip

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Download sidecars
        shell: bash
        run: .github/scripts/download-sidecars.sh "${{ matrix.target }}"
        env:
          FFMPEG_URL: ${{ matrix.ffmpeg_url }}
          MAGICK_URL: ${{ matrix.magick_url }}
          PANDOC_URL: ${{ matrix.pandoc_url }}

      - uses: actions/upload-artifact@v4
        with:
          name: sidecars-${{ matrix.target }}
          path: src-tauri/binaries/

  build:
    name: Build (${{ matrix.platform }})
    needs: prepare-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - platform: macos-13
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download sidecar binaries
        uses: actions/download-artifact@v4
        with:
          name: sidecars-${{ matrix.target }}
          path: src-tauri/binaries/

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VERT Desktop ${{ github.ref_name }}"
          releaseBody: |
            ## VERT Desktop ${{ github.ref_name }}

            Privacy-first file converter — all conversions happen locally.

            ### Downloads
            - **Linux**: `.deb` (Ubuntu/Debian) or `.AppImage` (universal)
            - **macOS Intel**: `.dmg`
            - **macOS Apple Silicon**: `.dmg`
          releaseDraft: ${{ inputs.draft || false }}
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          repository: sindus/homebrew-vert-desktop
          token: ${{ secrets.GH_PAT }}
          path: homebrew-tap

      - name: Get release assets
        id: release
        run: |
          TAG=${{ github.ref_name }}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        working-directory: homebrew-tap
        run: |
          VERSION=${{ steps.release.outputs.version }}
          TAG=${{ steps.release.outputs.tag }}

          # Fetch the macOS ARM64 DMG URL and SHA256
          DMG_URL="https://github.com/sindus/vert-desktop/releases/download/${TAG}/VERT.Desktop_${VERSION}_aarch64.dmg"
          SHA256=$(curl -sL "${DMG_URL}" | sha256sum | awk '{print $1}')

          cat > Formula/vert-desktop.rb << EOF
          cask "vert-desktop" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/sindus/vert-desktop/releases/download/v#{version}/VERT.Desktop_#{version}_aarch64.dmg",
                verified: "github.com/sindus/vert-desktop/"

            name "VERT Desktop"
            desc "Privacy-first file converter — runs entirely on your machine"
            homepage "https://sindus.github.io/vert-desktop"

            app "VERT Desktop.app"

            zap trash: [
              "~/Library/Application Support/sh.vert.desktop",
              "~/Library/Preferences/sh.vert.desktop.plist",
            ]
          end
          EOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/vert-desktop.rb
          git commit -m "vert-desktop: update to ${VERSION}"
          git push
